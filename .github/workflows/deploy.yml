name: Deploy to GitHub Pages

# Publishes the static site on every push to main, and on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment; don't cancel a run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # No build step — this is a static HTML site, so we upload the repo as-is.
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
